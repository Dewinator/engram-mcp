version: "3.8"

services:
  # PostgreSQL with pgvector extension
  db:
    image: pgvector/pgvector:0.8.0-pg16
    container_name: vectormemory-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54322}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-vectormemory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vectormemory}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgREST — REST API for PostgreSQL
  rest:
    image: postgrest/postgrest:v12.2.3
    container_name: vectormemory-rest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-54321}:3000"
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vectormemory}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
